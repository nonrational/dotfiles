name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - run: make test
      - run: |
          export HOME="$(mktemp -d)"
          ./deploy.sh apply
          ./deploy.sh audit
      - run: make check-copilot-instructions
